<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InDecor</title>
    <!-- Text font -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Icons Font -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"
    />
  </head>
  <body>
    
  <header></header>
  <main class="container">
    <section class="container__principal">
      <h1 class="container__title__principal"> InDecor</h1>
      <h1>um evento para revolucionar a sua criatividade</h1>
      <p>Data do evento:</p>
      <p>Domingo, 28 de Maio, a partir das 14h</p>
    </section>
    <img src="imagem/hrz-5.jpg" alt="Imagem de fundo do primeiro banner">

    <section id="contact" class="text-image-section">
      </div>
      <div id="contact-information" class="text-container">
        <p class="section-subtitle">Preencha o formulário para receber detalhes do evento</p>
        <form>
          <div class="form-control">
            <input type="text" name="name" id="name" placeholder="Nome" />
          </div>
          <div>
            <input type="email" name="email" id="email" placeholder="E-mail" />
          </div>
          <div>
          <input type="text" name="phone" id="phone" placeholder="Telefone" />
          </div>
          <textarea
            name="message"
            id="message"
            placeholder="Principal interesse"
          ></textarea>

          <!-- Cabeçalho e Banner -->
  <header id="header">
          <div class="banner active">
            <span class="square"></span>

          </div>
        </header>
        </form>
      </div>
    </section>
  </main>
  </body>
  </html>
